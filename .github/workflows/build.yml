on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string
      os:
        required: true
        type: string
      python-version:
        required: true
        type: string
      python-architecture:
        required: true
        type: string
      rust:
        required: true
        type: string
      rust-target:
        required: true
        type: string
      MSRV:
        required: true
        type: string
      verbose:
        type: boolean
        default: false

    secrets:
      CODECOV_TOKEN:
        required: false

env:
  NOX_DEFAULT_VENV_BACKEND: uv
  _PYO3_IS_MACOS_PY39_X64: >-
    ${{ inputs.os == 'macos-latest' &&
        inputs.python-version == '3.9' &&
        inputs.python-architecture == 'x64' }}
  _PYO3_CI_ENABLE_CACHE_SAVE: >-
    ${{ github.ref == 'refs/heads/main' || 
        contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}

jobs:
  build:
    continue-on-error: ${{ endsWith(inputs.python-version, '-dev') || contains(fromJSON('["beta", "nightly"]'), inputs.rust) }}
    runs-on: ${{ inputs.os }}
    if: ${{ !(startsWith(inputs.python-version, 'graalpy') && startsWith(inputs.os, 'windows')) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.sha }}
          persist-credentials: false

      # installs using setup-python do not work for arm macOS 3.9 and below
      - if: ${{ env._PYO3_IS_MACOS_PY39_X64 == 'false' }}
        name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}
          architecture: ${{ inputs.python-architecture }}
          # PyPy can have FFI changes within Python versions, which creates pain in CI
          check-latest: ${{ startsWith(inputs.python-version, 'pypy') }}

      # workaround for the above, only available for 3.9
      - if: ${{ env.IS_MACOS_PY39_X64 == 'true' }}
        name: Set up Python ${{ inputs.python-version }}
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: cpython-${{ inputs.python-version }}-macos-x86-64
          save-cache: ${{ env._PYO3_CI_ENABLE_CACHE_SAVE }}

      - if: ${{ env.IS_MACOS_PY39_X64 == 'false' }}
        name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          save-cache: ${{ env._PYO3_CI_ENABLE_CACHE_SAVE }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master # zizmor: ignore[unpinned-uses]
        with:
          toolchain: ${{ inputs.rust }}
          targets: ${{ inputs.rust-target }}
          # rust-src needed to correctly format errors, see #1865
          components: rust-src

      # On windows 32 bit, we are running on an x64 host, so we need to specifically set the target
      # NB we don't do this for *all* jobs because it breaks coverage of proc macros to have an
      # explicit target set.
      - name: Set Rust target for Windows 32-bit
        if: inputs.os == 'windows-latest' && inputs.python-architecture == 'x86'
        shell: bash
        run: |
          echo "CARGO_BUILD_TARGET=i686-pc-windows-msvc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ env._PYO3_CI_ENABLE_CACHE_SAVE }}

      - if: inputs.os == 'ubuntu-latest'
        name: Prepare LD_LIBRARY_PATH (Ubuntu only)
        run: echo LD_LIBRARY_PATH=${pythonLocation}/lib >> $GITHUB_ENV

      - if: inputs.rust == inputs.MSRV
        name: Prepare MSRV package versions
        run: uvx nox -s set-msrv-package-versions

      - if: inputs.rust != 'stable'
        name: Ignore changed error messages for ui tests (still run for coverage)
        run: echo "UI_TEST=ignore" >> "$GITHUB_ENV"

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        if: ${{ inputs.rust == 'stable' && !startsWith(inputs.python-version, 'graalpy') }}
        id: ffi-changes
        with:
          base: ${{ github.event.merge_group.base_ref }}
          ref: ${{ github.event.merge_group.head_ref }}
          filters: |
            changed:
              - 'pyo3-ffi/**'
              - 'pyo3-ffi-check/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/build.yml'

      - name: Run pyo3-ffi-check
        # TODO: investigate graalpy failures
        if: ${{ endsWith(inputs.python-version, '-dev') || (steps.ffi-changes.outputs.changed == 'true' && inputs.rust == 'stable' && !startsWith(inputs.python-version, 'graalpy')) }}
        run: uvx nox -s ffi-check

      - uses: ./.github/actions/prepare-coverage
        # https://github.com/rust-lang/rust/issues/150123
        if: inputs.os != 'windows-11-arm'

      - name: Build docs
        run: uvx nox -s docs

      - name: Run Rust tests
        run: uvx nox -s test-rust

      - name: Test python examples and tests
        shell: bash
        run: uvx nox -s test-py
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target

      - uses: ./.github/actions/report-coverage
        # https://github.com/rust-lang/rust/issues/150123
        if: inputs.os != 'windows-11-arm'
        with:
          name: ${{ inputs.os }}/${{ inputs.python-version }}/${{ inputs.rust }}
          token: ${{ secrets.CODECOV_TOKEN }}

    env:
      CARGO_TERM_VERBOSE: ${{ inputs.verbose }}
      RUST_BACKTRACE: 1
      RUSTFLAGS: "-D warnings"
      RUSTDOCFLAGS: "-D warnings"
